<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Account</title>
  <link rel="stylesheet" href="../Css/style.css" />
  
  <!-- Sidebar Component -->
  <script src="../Js/components/sidebar-loader.js"></script>
  
  <!-- Security measures to prevent copying -->
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" />
</head>
<body>
  <div id="app">

    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
      <div class="topbar-right">
        <details class="berichten-dropdown">
          <summary class="berichten-menu-summary">
            <span class="bell-icon">✉️</span>
            <span class="berichten-badge">0</span>
          </summary>
          <div class="berichten-menu">
            <div class="berichten-menu-name"></div>
            <!-- Dynamische berichten worden hier toegevoegd -->
          </div>
        </details>
        <details class="profile-dropdown">
          <summary class="avatar">
            <img src="https://ui-avatars.com/api/?name=User&background=4ade80&color=000&size=36" alt="avatar" />
          </summary>
          <div class="profile-menu">
            <div class="profile-menu-name"></div>
            <a class="profile-menu-item" href="account.html">Account</a>
            <div class="profile-menu-item" onclick="logout()">Uitloggen</div>
          </div>
        </details>
      </div>
    </nav>

    <div class="layout">
      <!-- Sidebar Component Placeholder -->
      <aside class="sidebar">
        <!-- Sidebar wordt automatisch geladen via sidebar-loader.js -->
      </aside>

      <main class="content">

        <div class="account-top-grid">
          <div class="card acc-info-card">
            <h3>Info</h3>
            <div class="acc-field"><span class="acc-label">Gebruikersnaam</span><div class="acc-val" id="info-username">-</div></div>
            <div class="acc-field"><span class="acc-label">ID</span><div class="acc-val mono" id="info-id">-</div></div>
            <div class="acc-field"><span class="acc-label">Dienst</span><div class="acc-val" id="info-dienst">-</div></div>
            <div class="acc-field" data-roepnummer="" id="info-roepnummer"><span class="acc-label">Roepnummer</span><div class="acc-val" id="info-roepnummer-val">-</div></div>
          </div>

          <div class="card acc-settings-card">
            <h3>Instellingen</h3>

            <div class="form-group">
              <label>Volledige naam</label>
              <input type="text" id="set-fullname" class="input-field" />
            </div>

            <div class="form-group">
              <label>Rang icoon</label>
              <input type="text" id="set-rangicoon" class="input-field" placeholder="Bvb. ❯" />
            </div>

            <div class="form-group">
              <label>Audio Volume</label>
              <div style="display:flex;gap:10px;align-items:center">
                <input type="range" id="audio-volume" class="input-field" min="0" max="100" value="30" style="flex:1" />
                <button class="btn-purple small" onclick="testAudioVolume()">Test</button>
              </div>
              <small style="color:#888;display:block;margin-top:4px">
                Huidig: <span id="audio-volume-value">30%</span>
              </small>
            </div>

            <button class="btn-purple" onclick="saveAccount()">OPSLAAN</button>
          </div>

          <div class="card acc-trainingen-card">
            <h3>Discord Rollen</h3>
            <div class="discord-rollen-grid" id="discord-rollen-grid"></div>
          </div>
        </div>

        <div class="tijden-cards">
          <div class="card">
            <h3>Noodhulp</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-porto"></tbody></table>
          </div>
          <div class="card">
            <h3>OPCO</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-opco"></tbody></table>
          </div>
          <div class="card">
            <h3>OVD</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-ovd"></tbody></table>
          </div>
          <div class="card">
            <h3>OPS</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-oc"></tbody></table>
          </div>
        </div>

      </main>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden">
      <span>&#10003;</span> <span id="toast-msg"></span>
      <button onclick="hideToast()">&#10005;</button>
    </div>

  </div>
  <script src="../Js/app.js"></script>
  <script src="../Js/account.js"></script>
  
  <script>
    // Update actieve navigatie
    function updateActiveNavigation() {
      // Verwijder active class van alle sidebar items
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
      });
      
      // Voeg active class toe aan huidige pagina
      const currentPage = window.location.pathname.split('/').pop();
      const navItem = document.querySelector(`[href="${currentPage}"]`);
      if (navItem) {
        navItem.classList.add('active');
      }
    }
    
    // Initialiseer navigatie
    document.addEventListener('DOMContentLoaded', function() {
      // Wacht langer op DOM dan update navigatie
      setTimeout(updateActiveNavigation, 300);
      // Fallback - probeer nog een keer
      setTimeout(updateActiveNavigation, 500);
      // Forceer directe manipulatie
      setTimeout(function() {
        const accountLink = document.getElementById('nav-account');
        if (accountLink) {
          accountLink.classList.add('active');
        }
      }, 100);
    });
  </script>
  
  <script>
    // Check if user is admin (Discord ID 1196035736823156790)
    const user = JSON.parse(sessionStorage.getItem('user') || '{}');
    const isAdmin = user.id === '1196035736823156790';
    
    if (isAdmin) {
      console.log('[ADMIN] Admin mode - security measures disabled');
    } else {
      // Anti-copying and anti-inspection measures for non-admin users
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
        }
      });

      // Disable text selection
      document.addEventListener('mousedown', e => {
        if (e.detail > 1) e.preventDefault();
      });
    }

    // Detect developer tools (bypass for admin)
    if (!isAdmin) {
      let devtools = { open: false, orientation: null };
      setInterval(() => {
        if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
          if (!devtools.open) {
            devtools.open = true;
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:red;font-size:24px;">Developer tools are not allowed!</div>';
          }
        } else {
          devtools.open = false;
        }
      }, 500);
    }
  </script>
  <script src="../config.js"></script>
  <script src="../Js/app.js"></script>
  <script src="../Js/berichten.js"></script>
</body>
</html>
