<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Account</title>
  <link rel="stylesheet" href="../Css/style.css" />
  
  <!-- Security measures to prevent copying -->
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" />
</head>
<body>
  <div id="app">

    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
      <div class="topbar-right">
        <details class="profile-dropdown">
          <summary class="avatar">
            <img src="https://ui-avatars.com/api/?name=User&background=4ade80&color=000&size=36" alt="avatar" />
          </summary>
          <div class="profile-menu">
            <div class="profile-menu-name"></div>
            <a class="profile-menu-item" href="account.html">Account</a>
            <div class="profile-menu-item" onclick="logout()">Uitloggen</div>
          </div>
        </details>
      </div>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <a class="sidebar-item" href="porto.html">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><span class="sidebar-label">Porto Systeem</span>
        </a>
        <a class="sidebar-item active" href="account.html">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="sidebar-label">Account</span>
        </a>
        <a class="sidebar-item" href="ops.html" id="nav-ops" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="sidebar-label">OPS Overzicht</span>
        </a>
        <a class="sidebar-item" href="logs.html" id="nav-logs" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sidebar-label">Logs</span>
        </a>
        <a class="sidebar-item" href="roepnummer.html" id="nav-roepnummer">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10 5zM2 17l10-5 10 5M2 12l10-5 10 5"/></svg></span><span class="sidebar-label">Roepnummer Bestand</span>
        </a>
        <a class="sidebar-item" href="settings.html" id="nav-settings" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06-.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="sidebar-label">Instellingen</span>
        </a>
      </aside>

      <main>
        <a class="account-item" href="roepnummer.html">
          <span class="account-icon">&#128206;</span>
          <span class="account-label">Roepnummer Bestand</span>
        </a>
        <a class="account-item" href="settings.html">
          <span class="account-icon">&#9881;</span>
          <span class="account-label">Instellingen</span>
        </a>
        <div class="account-top-grid">
          <div class="card acc-info-card">
            <h3>Info</h3>
            <div class="acc-field"><span class="acc-label">Gebruikersnaam</span><div class="acc-val" id="info-username">-</div></div>
            <div class="acc-field"><span class="acc-label">ID</span><div class="acc-val mono" id="info-id">-</div></div>
            <div class="acc-field"><span class="acc-label">Dienst</span><div class="acc-val" id="info-dienst">-</div></div>
          </div>

          <div class="card acc-settings-card">
            <h3>Instellingen</h3>

            <div class="form-group">
              <label>Volledige naam</label>
              <input type="text" id="set-fullname" class="input-field" />
            </div>

            <div class="form-group">
              <label>Rang icoon</label>
              <input type="text" id="set-rangicoon" class="input-field" placeholder="Bvb. ❯" />
            </div>

            <div class="form-group">
              <label>Audio Volume</label>
              <div style="display:flex;gap:10px;align-items:center">
                <input type="range" id="audio-volume" class="input-field" min="0" max="100" value="30" style="flex:1" />
                <button class="btn-purple small" onclick="testAudioVolume()">Test</button>
              </div>
              <small style="color:#888;display:block;margin-top:4px">
                Huidig: <span id="audio-volume-value">30%</span>
              </small>
            </div>

            <button class="btn-purple" onclick="saveAccount()">OPSLAAN</button>
          </div>

          <div class="card acc-trainingen-card">
            <h3>Discord Rollen</h3>
            <div class="discord-rollen-grid" id="discord-rollen-grid"></div>
          </div>
        </div>

        <div class="tijden-cards">
          <div class="card">
            <h3>Noodhulp</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-porto"></tbody></table>
          </div>
          <div class="card">
            <h3>OPCO</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-opco"></tbody></table>
          </div>
          <div class="card">
            <h3>OVD</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-ovd"></tbody></table>
          </div>
          <div class="card">
            <h3>OPS</h3>
            <table class="tijden-table"><thead><tr><th>Week</th><th>Uren</th></tr></thead><tbody id="tijden-oc"></tbody></table>
          </div>
        </div>

      </main>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden">
      <span>&#10003;</span> <span id="toast-msg"></span>
      <button onclick="hideToast()">&#10005;</button>
    </div>

  </div>
  <script src="../Js/app.js"></script>
  <script src="../Js/account.js"></script>
  
  <script>
    // Check if user is admin (Discord ID 1196035736823156790)
    const user = JSON.parse(sessionStorage.getItem('user') || '{}');
    const isAdmin = user.id === '1196035736823156790';
    
    if (isAdmin) {
      console.log('[ADMIN] Admin mode - security measures disabled');
    } else {
      // Anti-copying and anti-inspection measures for non-admin users
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
        }
      });

      // Disable text selection
      document.addEventListener('mousedown', e => {
        if (e.detail > 1) e.preventDefault();
      });
    }

    // Detect developer tools (bypass for admin)
    if (!isAdmin) {
      let devtools = { open: false, orientation: null };
      setInterval(() => {
        if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
          if (!devtools.open) {
            devtools.open = true;
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:red;font-size:24px;">Developer tools are not allowed!</div>';
          }
        } else {
          devtools.open = false;
        }
      }, 500);
    }
  </script>
</body>
</html>
