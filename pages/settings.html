<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Instellingen</title>
  <link rel="stylesheet" href="../Css/style.css" />
</head>
<body>
  <div id="app">
    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
      <div class="topbar-right">
        <details class="profile-dropdown">
          <summary class="avatar">
            <img src="https://ui-avatars.com/api/?name=User&background=4ade80&color=000&size=36" alt="avatar" />
          </summary>
          <div class="profile-menu">
            <div class="profile-menu-name"></div>
            <a class="profile-menu-item" href="account.html">Account</a>
            <div class="profile-menu-item" onclick="logout()">Uitloggen</div>
          </div>
        </details>
      </div>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <a class="sidebar-item active" href="porto.html" id="nav-porto">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><span class="sidebar-label">Porto Systeem</span>
        </a>
        <a class="sidebar-item" href="account.html">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <span class="sidebar-label">Account</span>
        </a>
        <a class="sidebar-item" href="roepnummer.html" id="nav-roepnummer">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10 5zM2 17l10-5 10 5M2 12l10-5 10 5"/></svg></span><span class="sidebar-label">Roepnummers</span>
        </a>
        <a class="sidebar-item" href="ops.html" id="nav-ops" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="sidebar-label">OPS Overzicht</span>
        </a>
        <a class="sidebar-item" href="logs.html" id="nav-logs" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sidebar-label">Logs</span>
        </a>
        <a class="sidebar-item" href="settings.html" id="nav-settings" style="display:none">
          <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="sidebar-label">Instellingen</span>
        </a>
      </aside>

      <main class="content">
        <div class="card">
          <h3 style="margin-bottom:16px">Specialisatie limieten</h3>
          <table class="db-table">
            <thead><tr><th>Voertuig</th><th>Min eenheden</th><th>Vereiste rol</th><th>Tijdslot (vanaf)</th><th>Tijdslot (tot)</th><th></th></tr></thead>
            <tbody id="spec-tbody"></tbody>
          </table>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">DC naam instellingen</h3>
          <div class="toggle-row" style="margin-bottom:12px">
            <label class="toggle"><input type="checkbox" id="dc-namen-aan" onchange="toggleDcNamen(this)" /><span class="slider"></span></label>
            <span>DC namen aanpassen door bot</span>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">Koppel instellingen</h3>
          <div class="form-group">
            <label>Max eenheden per koppel</label>
            <input type="number" id="max-koppel" class="input-field" style="width:100px" value="2" min="2" max="4" />
          </div>
          <button class="btn-purple" onclick="slaKoppelOp()">Opslaan</button>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">Ping instellingen</h3>
          <div class="form-group">
            <label>Aanmelding ping herhalen na (seconden)</label>
            <input type="number" id="ping-interval" class="input-field" style="width:100px" value="30" min="10" max="300" />
          </div>
          <button class="btn-purple" onclick="slaPingIntervalOp()">Opslaan</button>
        </div>
      </main>
    </div>

    <div id="toast" class="toast hidden">
      <span>&#10003;</span> <span id="toast-msg"></span>
      <button onclick="hideToast()">&#10005;</button>
    </div>
  </div>

  <script src="../Js/app.js"></script>
  <script src="../Js/settings.js"></script>
</body>
</html>
