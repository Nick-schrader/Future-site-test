<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Instellingen</title>
  <link rel="stylesheet" href="../Css/style.css" />
  
  <!-- Sidebar Component -->
  <script src="../Js/components/sidebar-loader.js"></script>
</head>
<body>
  <div id="app">
    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
      <div class="topbar-right">
        <details class="berichten-dropdown">
          <summary class="berichten-menu-summary">
            <span class="bell-icon">✉️</span>
            <span class="berichten-badge">0</span>
          </summary>
          <div class="berichten-menu">
            <div class="berichten-menu-name"></div>
            <!-- Dynamische berichten worden hier toegevoegd -->
          </div>
        </details>
        <details class="profile-dropdown">
          <summary class="avatar">
            <img src="https://ui-avatars.com/api/?name=User&background=4ade80&color=000&size=36" alt="avatar" />
          </summary>
          <div class="profile-menu">
            <div class="profile-menu-name"></div>
            <a class="profile-menu-item" href="account.html">Account</a>
            <div class="profile-menu-item" onclick="logout()">Uitloggen</div>
          </div>
        </details>
      </div>
    </nav>

    <div class="layout">
      <!-- Sidebar Component Placeholder -->
      <aside class="sidebar">
        <!-- Sidebar wordt automatisch geladen via sidebar-loader.js -->
      </aside>

      <main class="content">
        <div class="card">
          <h3 style="margin-bottom:16px">Specialisatie limieten</h3>
          <table class="db-table">
            <thead><tr><th>Voertuig</th><th>Min eenheden</th><th>Vereiste rol</th><th>Tijdslot (vanaf)</th><th>Tijdslot (tot)</th><th></th></tr></thead>
            <tbody id="spec-tbody"></tbody>
          </table>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">DC naam instellingen</h3>
          <div class="toggle-row" style="margin-bottom:12px">
            <label class="toggle"><input type="checkbox" id="dc-namen-aan" onchange="toggleDcNamen(this)" /><span class="slider"></span></label>
            <span>DC namen aanpassen door bot</span>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">Koppel instellingen</h3>
          <div class="form-group">
            <label>Max eenheden per koppel</label>
            <input type="number" id="max-koppel" class="input-field" style="width:100px" value="2" min="2" max="4" />
          </div>
          <button class="btn-purple" onclick="slaKoppelOp()">Opslaan</button>
        </div>

        <div class="card" style="margin-top:16px">
          <h3 style="margin-bottom:16px">Ping instellingen</h3>
          <div class="form-group">
            <label>Aanmelding ping herhalen na (seconden)</label>
            <input type="number" id="ping-interval" class="input-field" style="width:100px" value="30" min="10" max="300" />
          </div>
          <button class="btn-purple" onclick="slaPingIntervalOp()">Opslaan</button>
        </div>
      </main>
    </div>

    <div id="toast" class="toast hidden">
      <span>&#10003;</span> <span id="toast-msg"></span>
      <button onclick="hideToast()">&#10005;</button>
    </div>
  </div>

  <script src="../Js/app.js"></script>
  <script src="../Js/settings.js"></script>
  
  <script>
    // Update actieve navigatie
    function updateActiveNavigation() {
      // Verwijder active class van alle sidebar items
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
      });
      
      // Voeg active class toe aan huidige pagina
      const currentPage = window.location.pathname.split('/').pop();
      const navItem = document.querySelector(`[href="${currentPage}"]`);
      if (navItem) {
        navItem.classList.add('active');
      }
    }
    
    // Initialiseer navigatie
    document.addEventListener('DOMContentLoaded', function() {
      // Wacht even op DOM dan update navigatie
      setTimeout(updateActiveNavigation, 100);
    });
  </script>
  <script src="../config.js"></script>
  <script src="../Js/app.js"></script>
  <script src="../Js/berichten.js"></script>
</body>
</html>
