<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Logs</title>
  <link rel="stylesheet" href="../Css/style.css" />
</head>
<body>
  <div id="app">
    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
      <div class="topbar-right">
        <details class="berichten-dropdown">
          <summary class="berichten-menu-summary">
            <span class="bell-icon">✉️</span>
            <span class="berichten-badge">0</span>
          </summary>
          <div class="berichten-menu">
            <div class="berichten-menu-name"></div>
            <!-- Dynamische berichten worden hier toegevoegd -->
          </div>
        </details>
        <details class="profile-dropdown">
          <summary class="avatar">
            <img src="https://ui-avatars.com/api/?name=User&background=4ade80&color=000&size=36" alt="avatar" />
          </summary>
          <div class="profile-menu">
            <div class="profile-menu-name"></div>
            <a class="profile-menu-item" href="account.html">Account</a>
            <div class="profile-menu-item" onclick="logout()">Uitloggen</div>
          </div>
        </details>
      </div>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <!-- Main -->
        <div class="sidebar-category" onclick="toggleCategory(this)">Main</div>
        <div class="sidebar-category-items">
          <a class="sidebar-item" href="porto.html" id="nav-porto">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><span class="sidebar-label">Porto</span>
          </a>
          <a class="sidebar-item" href="account.html">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <span class="sidebar-label">Account</span>
          </a>
          <a class="sidebar-item" href="roepnummer.html" id="nav-roepnummer">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10 5zM2 17l10-5 10 5M2 12l10-5 10 5"/></svg></span>
            <span class="sidebar-label">Roepnummers</span>
          </a>
        </div>

        <!-- Taken -->
        <div class="sidebar-category" onclick="toggleCategory(this)">Taken</div>
        <div class="sidebar-category-items">
          <a class="sidebar-item" href="ops.html" id="nav-ops">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
            <span class="sidebar-label">Ops overzicht</span>
          </a>
          <a class="sidebar-item" href="#">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><line x1="22" y1="11" x2="6" y2="11"/><path d="M22 11v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/></svg></span>
            <span class="sidebar-label">Werving en selectie</span>
          </a>
        </div>

        <!-- Kader -->
        <div class="sidebar-category" onclick="toggleCategory(this)">Kader</div>
        <div class="sidebar-category-items">
          <a class="sidebar-item active" href="logs.html" id="nav-logs">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
            <span class="sidebar-label">Logs</span>
          </a>
          <a class="sidebar-item" href="settings.html" id="nav-settings">
            <span class="sidebar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
            <span class="sidebar-label">Settings</span>
          </a>
        </div>
      </aside>

      <main class="content">
        <div class="card">
          <h3 style="margin-bottom:16px">Logs</h3>
          <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <select id="log-actie-filter" class="input-field" style="width:180px" onchange="filterLogs()">
              <option value="">Alle acties</option>
              <option value="uren_verwijderd">Uren verwijderd</option>
              <option value="uren_aangepast">Uren aangepast</option>
              <option value="uren_gereset">Uren gereset</option>
              <option value="promotie">Promotie</option>
              <option value="demotie">Demotie</option>
              <option value="roepnummer_wijziging">Roepnummer wijziging</option>
              <option value="ontslag">Ontslag</option>
              <option value="rang_wijziging">Rang wijziging</option>
              <option value="reset">Reset gebruiker</option>
              <option value="rol_toewijzen">Rol toegekend</option>
              <option value="indeling">Indeling gewijzigd</option>
              <option value="status">Status gewijzigd</option>
              <option value="voertuig">Voertuig gewijzigd</option>
              <option value="login">Login</option>
              <option value="logout">Logout</option>
              <option value="account_update">Account gewijzigd</option>
              <option value="koppel">Gekoppeld</option>
              <option value="ontkoppel">Ontkoppeld</option>
            </select>
            <input type="text" id="log-zoek-filter" class="input-field" style="width:200px" placeholder="Zoek op naam of details..." oninput="filterLogs()" />
            <input type="date" id="log-date-filter" class="input-field" style="width:150px" onchange="filterLogs()" />
            <button class="btn-ghost" onclick="clearFilters()">Filters wissen</button>
          </div>
          <div class="table-wrap">
            <table class="db-table">
              <thead><tr><th>Tijd</th><th>Actie</th><th>Door</th><th>Doelwit</th><th>Details</th><th>Extra</th></tr></thead>
              <tbody id="logs-tbody"><tr><td colspan="6" style="color:#555;text-align:center">Laden...</td></tr></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div id="toast" class="toast hidden">
      <span>&#10003;</span> <span id="toast-msg"></span>
      <button onclick="hideToast()">&#10005;</button>
    </div>
  </div>

  <script src="../Js/app.js"></script>
  <script src="../Js/logs.js"></script>
  
  <script>
    // Update actieve navigatie
    function updateActiveNavigation() {
      // Verwijder active class van alle sidebar items
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
      });
      
      // Voeg active class toe aan huidige pagina
      const currentPage = window.location.pathname.split('/').pop();
      const navItem = document.querySelector(`[href="${currentPage}"]`);
      if (navItem) {
        navItem.classList.add('active');
      }
    }
    
    // Initialiseer navigatie
    document.addEventListener('DOMContentLoaded', function() {
      // Wacht even op DOM dan update navigatie
      setTimeout(updateActiveNavigation, 100);
    });
  </script>
  <script>
    // Collapsible sidebar categories
    function toggleCategory(categoryElement) {
      const itemsContainer = categoryElement.nextElementSibling;
      const isCollapsed = categoryElement.classList.contains('collapsed');
      
      if (isCollapsed) {
        categoryElement.classList.remove('collapsed');
        itemsContainer.classList.remove('collapsed');
      } else {
        categoryElement.classList.add('collapsed');
        itemsContainer.classList.add('collapsed');
      }
    }
  </script>
  <script src="../config.js"></script>
  <script src="../Js/app.js"></script>
  <script src="../Js/berichten.js"></script>
</body>
</html>
