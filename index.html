<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porto Systeem - Aanmelden</title>
  <link rel="stylesheet" href="Css/style.css" />
  
  <!-- Security measures to prevent copying -->
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" />
</head>
<body>
  <div id="app">
    <nav class="topbar">
      <div class="logo">&#11041; Porto Systeem</div>
    </nav>

    <div class="login-body">
      <div class="modal-card">
        <h2>Aanmelden</h2>
        <a id="discord-login-btn" href="/auth/login" class="btn-purple btn-discord">
          Inloggen met Discord
        </a>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    function checkInput() {
      const val = document.getElementById('discord-id').value.trim();
      document.getElementById('login-btn').disabled = val.length === 0;
    }

    async function doLogin() {
      const discordId = document.getElementById('discord-id').value.trim();
      const btn = document.getElementById('login-btn');
      const loading = document.getElementById('login-loading');
      const error = document.getElementById('login-error');

      btn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';

      try {
        const res = await fetch(API + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ discordId })
        });

        const data = await res.json();

        if (!res.ok) {
          error.innerHTML = '<span>&#9888;</span> ' + (data.error || 'Onbekende fout');
          error.style.display = 'flex';
          btn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        // Reset database state bij Discord login
        fetch(API + '/api/reset/' + data.user.id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            indienstStart: null, 
            dcnaam: '', 
            roepnummer: '' 
          }),
        }).then(() => {
          // Reset rol in database
          return fetch(API + '/api/rol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              userId: data.user.id, 
              role: 'user', 
              indienstStart: null, 
              roepnummer: '', 
              rangicoon: '' 
            }),
          });
        }).then(() => {
          // Sla gebruiker op in localStorage
          localStorage.setItem('loggedIn', '1');
          localStorage.setItem('user', JSON.stringify({
            username: data.user.username,
            id: data.user.id,
            displayName: data.user.displayName,
            avatar: data.user.avatar,
            dienst: data.user.dienst,
            role: 'user', // Forceer naar user na reset
            rollen: data.user.rollen,
            fullname: data.user.displayName,
            shortname: '',
            dsi: '',
            dienstnummer: '',
            phone: '',
            refresh: 200,
            streamer: false,
            naamLock: false,
            indienstStart: null,
            status: null,
            voertuig: null,
          }));

          window.location.href = 'pages/porto.html';
        }).catch(err => {
          console.error('Database reset failed:', err);
          // Fallback: sla toch op zonder reset
          localStorage.setItem('loggedIn', '1');
          localStorage.setItem('user', JSON.stringify({
            username: data.user.username,
            id: data.user.id,
            displayName: data.user.displayName,
            avatar: data.user.avatar,
            dienst: data.user.dienst,
            role: 'user',
            rollen: data.user.rollen,
            fullname: data.user.displayName,
            shortname: '',
            dsi: '',
            dienstnummer: '',
            phone: '',
            refresh: 200,
            streamer: false,
            naamLock: false,
          }));
          window.location.href = 'pages/porto.html';
        });

      } catch (e) {
        error.innerHTML = '<span>&#9888;</span> Kan geen verbinding maken met de bot. Is die online?';
        error.style.display = 'flex';
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    if (sessionStorage.getItem('loggedIn')) {
      window.location.href = 'pages/porto.html';
    }
  </script>
  
  <script>
    // Check if user is admin (Discord ID 1196035736823156790)
    const user = JSON.parse(sessionStorage.getItem('user') || '{}');
    const isAdmin = user.id === '1196035736823156790';
    
    if (isAdmin) {
      console.log('[ADMIN] Admin mode - security measures disabled');
    } else {
      // Anti-copying and anti-inspection measures for non-admin users
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
        }
      });

      // Disable text selection
      document.addEventListener('mousedown', e => {
        if (e.detail > 1) e.preventDefault();
      });
    }

    // Detect developer tools (bypass for admin)
    if (!isAdmin) {
      let devtools = { open: false, orientation: null };
      setInterval(() => {
        if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
          if (!devtools.open) {
            devtools.open = true;
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:red;font-size:24px;">Developer tools are not allowed!</div>';
          }
        } else {
          devtools.open = false;
        }
      }, 500);
    }
  </script>
</body>
</html>
